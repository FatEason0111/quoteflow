<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuoteFlow Workspace Root</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5faf7;
        --surface: #ffffff;
        --ink: #11322d;
        --ink-soft: #5a746f;
        --accent: #23a464;
        --line: #d8e7e0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at top left, rgba(35, 164, 100, 0.12), transparent 20%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: "SUSE", sans-serif;
      }

      main {
        width: min(760px, 100%);
        padding: 2rem;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(17, 50, 45, 0.08);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 5vw, 3rem);
      }

      p {
        margin: 0;
        color: var(--ink-soft);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        gap: 1rem;
        margin-top: 1.75rem;
      }

      .card {
        padding: 1.25rem;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--surface);
      }

      .card h2 {
        margin: 0 0 0.5rem;
        font-size: 1.1rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        padding: 0.85rem 1rem;
        border-radius: 999px;
        text-decoration: none;
        color: inherit;
        border: 1px solid var(--line);
      }

      .primary {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SUSE:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <p>QuoteFlow Monorepo</p>
      <h1>前后端结构已经拆开。</h1>
      <p>
        前端原型现在在 <code>frontend/</code>，后端接口骨架在 <code>backend/</code>。
        这里保留一个根入口，方便你直接继续打开项目。
      </p>

      <div class="grid">
        <section class="card">
          <h2>Frontend</h2>
          <p>静态多页面原型，包含 landing、workspace 页面、共享样式和交互脚本。</p>
          <div class="actions">
            <a class="primary" href="./frontend/index.html">打开前端原型</a>
          </div>
        </section>

        <section class="card">
          <h2>Backend</h2>
          <p>轻量 Node API scaffold，已经分出 config、routes、controllers、services。</p>
          <div class="actions">
            <a href="./README.md">查看项目说明</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
